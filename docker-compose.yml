services:
  markdown-mermaid-pdf:
    build:
      context: .
      dockerfile: Dockerfile
    image: markdown-mermaid-pdf:latest
    volumes:
      - ./workspace:/workspace
    working_dir: /workspace

  markdown-mermaid-pdf-shell:
    build:
      context: .
      dockerfile: Dockerfile
    image: markdown-mermaid-pdf:latest
    volumes:
      - ./workspace:/workspace
    entrypoint: /bin/bash
    stdin_open: true
    tty: true
    working_dir: /workspace
