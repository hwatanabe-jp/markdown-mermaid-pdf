name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: markdown-mermaid-pdf

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      image_repo: ${{ steps.meta.outputs.image_repo }}
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          owner_lower="${GITHUB_REPOSITORY_OWNER,,}"
          image_repo="ghcr.io/${owner_lower}/${IMAGE_NAME}"
          version="${GITHUB_REF_NAME}"
          image_tag="${image_repo}:${version}"
          echo "version=${version}" >>"$GITHUB_OUTPUT"
          echo "image_repo=${image_repo}" >>"$GITHUB_OUTPUT"
          echo "image_tag=${image_tag}" >>"$GITHUB_OUTPUT"

  build_amd64:
    runs-on: ubuntu-latest
    needs: meta
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build amd64 release candidate image
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          platforms: linux/amd64
          outputs: type=image,name=${{ needs.meta.outputs.image_repo }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Smoke test pushed amd64 candidate
        shell: bash
        env:
          IMAGE_REF: ${{ needs.meta.outputs.image_repo }}@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          docker pull "${IMAGE_REF}"
          ./scripts/smoke-test-image.sh "${IMAGE_REF}"

      - name: Audit bundled Mermaid npm packages
        shell: bash
        env:
          IMAGE_REF: ${{ needs.meta.outputs.image_repo }}@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          docker run --rm \
            --entrypoint /bin/bash \
            "${IMAGE_REF}" \
            -lc 'npm audit --prefix /opt/mermaid-tools --omit=dev --audit-level=high'

  build_arm64:
    runs-on: ubuntu-24.04-arm
    needs: meta
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build arm64 release candidate image
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          platforms: linux/arm64
          outputs: type=image,name=${{ needs.meta.outputs.image_repo }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Smoke test pushed arm64 candidate
        shell: bash
        env:
          IMAGE_REF: ${{ needs.meta.outputs.image_repo }}@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          docker pull "${IMAGE_REF}"
          ./scripts/smoke-test-image.sh "${IMAGE_REF}"

  publish_release:
    runs-on: ubuntu-latest
    needs:
      - meta
      - build_amd64
      - build_arm64
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Capture bundled tool versions
        shell: bash
        env:
          IMAGE_REF: ${{ needs.meta.outputs.image_repo }}@${{ needs.build_amd64.outputs.digest }}
        run: |
          set -euo pipefail
          docker pull "${IMAGE_REF}"
          docker run --rm \
            --entrypoint /bin/bash \
            "${IMAGE_REF}" \
            -lc '
              {
                echo "## Bundled Versions"
                echo ""
                echo "- Node.js: $(node --version)"
                echo "- npm: $(npm --version)"
                echo "- Pandoc: $(pandoc --version | head -n 1)"
                echo "- XeLaTeX: $(xelatex --version | head -n 1)"
                echo "- Chromium: $(chromium --version)"
                echo "- Mermaid packages:"
                npm list --prefix /opt/mermaid-tools --depth=0 2>/dev/null | sed "1d; s/^/  /"
              } > /tmp/IMAGE_VERSIONS.md
              cat /tmp/IMAGE_VERSIONS.md
            ' > IMAGE_VERSIONS.md

      - name: Publish validated release manifest
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${{ needs.meta.outputs.image_tag }}" \
            --tag "${{ needs.meta.outputs.image_repo }}:latest" \
            "${{ needs.meta.outputs.image_repo }}@${{ needs.build_amd64.outputs.digest }}" \
            "${{ needs.meta.outputs.image_repo }}@${{ needs.build_arm64.outputs.digest }}"

      - name: Verify pushed image manifests
        id: published
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "${{ needs.meta.outputs.image_tag }}"
          docker buildx imagetools inspect "${{ needs.meta.outputs.image_repo }}:latest"
          digest="$(
            docker buildx imagetools inspect "${{ needs.meta.outputs.image_tag }}" \
              | awk '/^Digest:/ {print $2; exit}'
          )"
          if [ -z "${digest}" ]; then
            echo "Failed to resolve published manifest digest" >&2
            exit 1
          fi
          echo "digest=${digest}" >>"$GITHUB_OUTPUT"

      - name: Prepare release notes
        shell: bash
        run: |
          {
            echo "# markdown-mermaid-pdf container image"
            echo ""
            echo "- Source commit: ${{ github.sha }}"
            echo "- Image tag: ${{ needs.meta.outputs.image_tag }}"
            echo "- Image digest: ${{ steps.published.outputs.digest }}"
            echo "- Platforms: linux/amd64, linux/arm64"
            echo "- Tag policy: \`latest\` is reserved for stable releases; \`main\` tracks validated main-branch builds."
            echo ""
            echo "## Usage"
            echo '```bash'
            echo "docker pull ${{ needs.meta.outputs.image_tag }}"
            echo 'docker run --rm -v "$PWD/workspace:/workspace" ${{ needs.meta.outputs.image_tag }} document.md output.pdf'
            echo '```'
            echo ""
            cat IMAGE_VERSIONS.md
            echo ""
            echo "## Compliance"
            echo "- MIT-licensed project files (see attached LICENSE)"
            echo "- Third-party license summary (see attached THIRD_PARTY_NOTICES.md)"
          } > RELEASE_BODY.md

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          release_tag="${{ needs.meta.outputs.version }}"
          release_title="Container release ${release_tag}"
          if gh release view "${release_tag}" >/dev/null 2>&1; then
            gh release edit "${release_tag}" \
              --title "${release_title}" \
              --notes-file RELEASE_BODY.md
          else
            gh release create "${release_tag}" \
              --title "${release_title}" \
              --notes-file RELEASE_BODY.md
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "${{ needs.meta.outputs.version }}" \
            --clobber \
            "LICENSE" \
            "THIRD_PARTY_NOTICES.md"
