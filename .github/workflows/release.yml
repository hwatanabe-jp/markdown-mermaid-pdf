name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: markdown-mermaid-pdf

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          owner_lower="${GITHUB_REPOSITORY_OWNER,,}"
          image_repo="ghcr.io/${owner_lower}/${IMAGE_NAME}"
          version="${GITHUB_REF_NAME}"
          image_tag="${image_repo}:${version}"

          echo "version=${version}" >>"$GITHUB_OUTPUT"
          echo "image_repo=${image_repo}" >>"$GITHUB_OUTPUT"
          echo "image_tag=${image_tag}" >>"$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build amd64 release candidate image
        id: build_amd64
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          outputs: type=image,name=${{ steps.meta.outputs.image_repo }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test pushed amd64 candidate
        shell: bash
        env:
          IMAGE_REF: ${{ steps.meta.outputs.image_repo }}@${{ steps.build_amd64.outputs.digest }}
        run: |
          set -euo pipefail
          docker pull "${IMAGE_REF}"
          ./scripts/smoke-test-image.sh "${IMAGE_REF}"

      - name: Capture bundled tool versions
        shell: bash
        env:
          IMAGE_REF: ${{ steps.meta.outputs.image_repo }}@${{ steps.build_amd64.outputs.digest }}
        run: |
          set -euo pipefail
          docker run --rm \
            --entrypoint /bin/bash \
            "${IMAGE_REF}" \
            -lc '
              {
                echo "## Bundled Versions"
                echo ""
                echo "- Node.js: $(node --version)"
                echo "- npm: $(npm --version)"
                echo "- Pandoc: $(pandoc --version | head -n 1)"
                echo "- XeLaTeX: $(xelatex --version | head -n 1)"
                echo "- Chromium: $(chromium --version)"
                echo "- Mermaid packages:"
                npm list --prefix /opt/mermaid-tools --depth=0 2>/dev/null | sed "1d; s/^/  /"
              } > /tmp/IMAGE_VERSIONS.md
              cat /tmp/IMAGE_VERSIONS.md
            ' > IMAGE_VERSIONS.md

      - name: Build arm64 release candidate image
        id: build_arm64
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          outputs: type=image,name=${{ steps.meta.outputs.image_repo }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare arm64 smoke test Puppeteer config
        shell: bash
        run: cp config/.puppeteer.arm64-ci.json workspace/.puppeteer.json

      - name: Smoke test pushed arm64 candidate
        shell: bash
        env:
          DOCKER_PLATFORM: linux/arm64
          IMAGE_REF: ${{ steps.meta.outputs.image_repo }}@${{ steps.build_arm64.outputs.digest }}
        run: |
          set -euo pipefail
          docker pull --platform "${DOCKER_PLATFORM}" "${IMAGE_REF}"
          ./scripts/smoke-test-image.sh "${IMAGE_REF}"

      - name: Publish validated release manifest
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${{ steps.meta.outputs.image_tag }}" \
            --tag "${{ steps.meta.outputs.image_repo }}:latest" \
            "${{ steps.meta.outputs.image_repo }}@${{ steps.build_amd64.outputs.digest }}" \
            "${{ steps.meta.outputs.image_repo }}@${{ steps.build_arm64.outputs.digest }}"

      - name: Verify pushed image manifests
        id: published
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "${{ steps.meta.outputs.image_tag }}"
          docker buildx imagetools inspect "${{ steps.meta.outputs.image_repo }}:latest"
          digest="$(
            docker buildx imagetools inspect "${{ steps.meta.outputs.image_tag }}" \
              | awk '/^Digest:/ {print $2; exit}'
          )"
          if [ -z "${digest}" ]; then
            echo "Failed to resolve published manifest digest" >&2
            exit 1
          fi
          echo "digest=${digest}" >>"$GITHUB_OUTPUT"

      - name: Prepare release notes
        id: notes
        shell: bash
        run: |
          {
            echo "# markdown-mermaid-pdf container image"
            echo ""
            echo "- Source commit: ${{ github.sha }}"
            echo "- Image tag: ${{ steps.meta.outputs.image_tag }}"
            echo "- Image digest: ${{ steps.published.outputs.digest }}"
            echo "- Platforms: linux/amd64, linux/arm64"
            echo "- Tag policy: \`latest\` is reserved for stable releases; \`main\` tracks validated main-branch builds."
            echo ""
            echo "## Usage"
            echo '```bash'
            echo "docker pull ${{ steps.meta.outputs.image_tag }}"
            echo 'docker run --rm -v "$PWD/workspace:/workspace" ${{ steps.meta.outputs.image_tag }} document.md output.pdf'
            echo '```'
            echo ""
            cat IMAGE_VERSIONS.md
            echo ""
            echo "## Compliance"
            echo "- MIT-licensed project files (see attached LICENSE)"
            echo "- Third-party license summary (see attached THIRD_PARTY_NOTICES.md)"
          } > RELEASE_BODY.md

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          release_tag="${{ steps.meta.outputs.version }}"
          release_title="Container release ${release_tag}"
          if gh release view "${release_tag}" >/dev/null 2>&1; then
            gh release edit "${release_tag}" \
              --title "${release_title}" \
              --notes-file RELEASE_BODY.md
          else
            gh release create "${release_tag}" \
              --title "${release_title}" \
              --notes-file RELEASE_BODY.md
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "${{ steps.meta.outputs.version }}" \
            --clobber \
            "LICENSE" \
            "THIRD_PARTY_NOTICES.md"
