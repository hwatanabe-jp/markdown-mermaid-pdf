name: Scan Stable Images

on:
  release:
    types:
      - published
  # Releases created by the Release workflow use GITHUB_TOKEN, which does not
  # fan out a new workflow run from the release event alone.
  workflow_run:
    workflows:
      - Release
    types:
      - completed
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  security-events: write

env:
  IMAGE_NAME: markdown-mermaid-pdf

jobs:
  trivy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    name: Trivy (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve stable image reference
        id: image
        shell: bash
        run: |
          set -euo pipefail
          owner_lower="${GITHUB_REPOSITORY_OWNER,,}"
          image_repo="ghcr.io/${owner_lower}/${IMAGE_NAME}"

          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            image_ref="${image_repo}:${{ github.event.release.tag_name }}"
          else
            image_ref="${image_repo}:latest"
          fi

          echo "image_ref=${image_ref}" >>"$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull published image
        shell: bash
        run: |
          set -euo pipefail
          docker pull --platform "${{ matrix.platform }}" "${{ steps.image.outputs.image_ref }}"

      # Pin setup-trivy to a checked release and keep the Trivy binary on the
      # latest checked v0.71.2 release.
      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # setup-trivy v0.3.1
        with:
          version: v0.71.2
          cache: true

      - name: Fail on fixed critical vulnerabilities or EOL base images
        shell: bash
        run: |
          set -euo pipefail
          trivy image \
            --scanners vuln \
            --ignore-unfixed \
            --severity CRITICAL \
            --exit-code 1 \
            --exit-on-eol 1 \
            --timeout 10m \
            --format table \
            --no-progress \
            "${{ steps.image.outputs.image_ref }}"

      - name: Generate SARIF report
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          trivy image \
            --scanners vuln \
            --ignore-unfixed \
            --severity CRITICAL \
            --timeout 10m \
            --format sarif \
            --output "trivy-results-${{ matrix.arch }}.sarif" \
            --no-progress \
            "${{ steps.image.outputs.image_ref }}"

      - name: Fail on high npm advisories in bundled Mermaid packages
        if: matrix.arch == 'amd64'
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            --entrypoint /bin/bash \
            "${{ steps.image.outputs.image_ref }}" \
            -lc 'npm audit --prefix /opt/mermaid-tools --omit=dev --audit-level=high'

      - name: Upload Trivy scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-results-${{ matrix.arch }}.sarif
          category: trivy-${{ matrix.arch }}
