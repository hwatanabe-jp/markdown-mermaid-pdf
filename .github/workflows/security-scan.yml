name: Scan Stable Images

on:
  release:
    types:
      - published
  # Releases created by the Release workflow use GITHUB_TOKEN, which does not
  # fan out a new workflow run from the release event alone.
  workflow_run:
    workflows:
      - Release
    types:
      - completed
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  security-events: write

env:
  IMAGE_NAME: markdown-mermaid-pdf

jobs:
  trivy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    name: Trivy (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve stable image reference
        id: image
        shell: bash
        run: |
          set -euo pipefail
          owner_lower="${GITHUB_REPOSITORY_OWNER,,}"
          image_repo="ghcr.io/${owner_lower}/${IMAGE_NAME}"

          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            image_ref="${image_repo}:${{ github.event.release.tag_name }}"
          else
            image_ref="${image_repo}:latest"
          fi

          echo "image_ref=${image_ref}" >>"$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull published image
        shell: bash
        run: |
          set -euo pipefail
          docker pull --platform "${{ matrix.platform }}" "${{ steps.image.outputs.image_ref }}"

      # Pin setup-trivy to the restored safe v0.2.6 commit and keep the Trivy
      # binary on the advisory-listed safe v0.69.3 release.
      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # setup-trivy v0.2.6
        with:
          version: v0.69.3
          cache: true

      - name: Fail on fixed critical vulnerabilities or EOL base images
        shell: bash
        run: |
          set -euo pipefail
          trivy image \
            --scanners vuln \
            --ignore-unfixed \
            --severity CRITICAL \
            --exit-code 1 \
            --exit-on-eol 1 \
            --timeout 10m \
            --format table \
            --no-progress \
            "${{ steps.image.outputs.image_ref }}"

      - name: Generate SARIF report
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          trivy image \
            --scanners vuln \
            --ignore-unfixed \
            --severity CRITICAL \
            --timeout 10m \
            --format sarif \
            --output "trivy-results-${{ matrix.arch }}.sarif" \
            --no-progress \
            "${{ steps.image.outputs.image_ref }}"

      - name: Fail on high npm advisories in bundled Mermaid packages
        if: matrix.arch == 'amd64'
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            --entrypoint /bin/bash \
            "${{ steps.image.outputs.image_ref }}" \
            -lc 'npm audit --prefix /opt/mermaid-tools --omit=dev --audit-level=high'

      - name: Upload Trivy scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: trivy-results-${{ matrix.arch }}.sarif
          category: trivy-${{ matrix.arch }}
