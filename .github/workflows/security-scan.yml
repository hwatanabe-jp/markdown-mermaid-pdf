name: Scan Stable Images

on:
  release:
    types:
      - published
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  security-events: write

env:
  IMAGE_NAME: markdown-mermaid-pdf

jobs:
  trivy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve stable image reference
        id: image
        shell: bash
        run: |
          set -euo pipefail
          owner_lower="${GITHUB_REPOSITORY_OWNER,,}"
          image_repo="ghcr.io/${owner_lower}/${IMAGE_NAME}"

          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            image_ref="${image_repo}:${{ github.event.release.tag_name }}"
          else
            image_ref="${image_repo}:latest"
          fi

          echo "image_ref=${image_ref}" >>"$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull published image
        shell: bash
        run: |
          set -euo pipefail
          docker pull "${{ steps.image.outputs.image_ref }}"

      # Pin the setup action to the known-safe commit from the March 2026
      # supply-chain incident advisory rather than a mutable tag.
      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514
        with:
          version: v0.69.3
          cache: true

      - name: Fail on fixed critical vulnerabilities or EOL base images
        shell: bash
        run: |
          set -euo pipefail
          trivy image \
            --scanners vuln \
            --ignore-unfixed \
            --severity CRITICAL \
            --exit-code 1 \
            --exit-on-eol 1 \
            --timeout 10m \
            --format table \
            --no-progress \
            "${{ steps.image.outputs.image_ref }}"

      - name: Generate SARIF report
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          trivy image \
            --scanners vuln \
            --ignore-unfixed \
            --severity CRITICAL \
            --timeout 10m \
            --format sarif \
            --output trivy-results.sarif \
            --no-progress \
            "${{ steps.image.outputs.image_ref }}"

      - name: Upload Trivy scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
