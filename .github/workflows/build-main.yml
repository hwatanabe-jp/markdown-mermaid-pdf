name: Build Main Branch

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: markdown-mermaid-pdf
  TEST_IMAGE_TAG: markdown-mermaid-pdf:ci-test

jobs:
  build:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build candidate image for validation
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ env.TEST_IMAGE_TAG }}

      - name: Smoke test candidate image
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/smoke-test-image.sh "${{ env.TEST_IMAGE_TAG }}"

  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          owner_lower="${GITHUB_REPOSITORY_OWNER,,}"
          image_repo="ghcr.io/${owner_lower}/${IMAGE_NAME}"
          echo "image_repo=${image_repo}" >>"$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build amd64 candidate image
        id: build_amd64
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          outputs: type=image,name=${{ steps.meta.outputs.image_repo }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test pushed amd64 candidate
        shell: bash
        env:
          IMAGE_REF: ${{ steps.meta.outputs.image_repo }}@${{ steps.build_amd64.outputs.digest }}
        run: |
          set -euo pipefail
          docker pull "${IMAGE_REF}"
          ./scripts/smoke-test-image.sh "${IMAGE_REF}"

      - name: Build arm64 candidate image
        id: build_arm64
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          outputs: type=image,name=${{ steps.meta.outputs.image_repo }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare arm64 smoke test Puppeteer config
        shell: bash
        run: |
          rm -f workspace/.puppeteer.json
          cp config/.puppeteer.arm64-ci.json workspace/.puppeteer.json

      - name: Smoke test pushed arm64 candidate
        shell: bash
        env:
          DOCKER_PLATFORM: linux/arm64
          IMAGE_REF: ${{ steps.meta.outputs.image_repo }}@${{ steps.build_arm64.outputs.digest }}
        run: |
          set -euo pipefail
          docker pull --platform "${DOCKER_PLATFORM}" "${IMAGE_REF}"
          ./scripts/smoke-test-image.sh "${IMAGE_REF}"

      - name: Publish validated main manifest
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${{ steps.meta.outputs.image_repo }}:main" \
            "${{ steps.meta.outputs.image_repo }}@${{ steps.build_amd64.outputs.digest }}" \
            "${{ steps.meta.outputs.image_repo }}@${{ steps.build_arm64.outputs.digest }}"

      - name: Verify pushed image manifest
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "${{ steps.meta.outputs.image_repo }}:main"
