name: Build Main Branch

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: markdown-mermaid-pdf
  TEST_IMAGE_TAG: markdown-mermaid-pdf:ci-test

jobs:
  meta:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      image_repo: ${{ steps.meta.outputs.image_repo }}

    steps:
      - name: Compute image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          owner_lower="${GITHUB_REPOSITORY_OWNER,,}"
          image_repo="ghcr.io/${owner_lower}/${IMAGE_NAME}"
          echo "image_repo=${image_repo}" >>"$GITHUB_OUTPUT"

  validate_amd64:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build candidate image for amd64 validation
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ env.TEST_IMAGE_TAG }}

      - name: Smoke test amd64 candidate image
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/smoke-test-image.sh "${{ env.TEST_IMAGE_TAG }}"

  validate_arm64:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build candidate image for arm64 validation
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ env.TEST_IMAGE_TAG }}

      - name: Smoke test arm64 candidate image
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/smoke-test-image.sh "${{ env.TEST_IMAGE_TAG }}"

  build:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs:
      - validate_amd64
      - validate_arm64

    steps:
      - name: Confirm validation jobs passed
        shell: bash
        run: |
          set -euo pipefail
          echo "amd64 and arm64 validation jobs passed"

  publish_amd64:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: meta
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build amd64 candidate image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          outputs: type=image,name=${{ needs.meta.outputs.image_repo }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test pushed amd64 candidate
        shell: bash
        env:
          IMAGE_REF: ${{ needs.meta.outputs.image_repo }}@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          docker pull "${IMAGE_REF}"
          ./scripts/smoke-test-image.sh "${IMAGE_REF}"

  publish_arm64:
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04-arm
    needs: meta
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build arm64 candidate image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          outputs: type=image,name=${{ needs.meta.outputs.image_repo }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test pushed arm64 candidate
        shell: bash
        env:
          IMAGE_REF: ${{ needs.meta.outputs.image_repo }}@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          docker pull "${IMAGE_REF}"
          ./scripts/smoke-test-image.sh "${IMAGE_REF}"

  publish_manifest:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs:
      - meta
      - publish_amd64
      - publish_arm64
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish validated main manifest
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${{ needs.meta.outputs.image_repo }}:main" \
            "${{ needs.meta.outputs.image_repo }}@${{ needs.publish_amd64.outputs.digest }}" \
            "${{ needs.meta.outputs.image_repo }}@${{ needs.publish_arm64.outputs.digest }}"

      - name: Verify pushed image manifest
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "${{ needs.meta.outputs.image_repo }}:main"
