name: Cleanup Old GHCR Versions

on:
  schedule:
    # Run every Sunday at 3:00 UTC
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Delete old container versions
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          # Package name (auto-detected from repository if not specified)
          package: markdown-mermaid-pdf

          # Keep the 5 most recent release tags while preserving the stable and
          # main tracking tags.
          delete-tags: v*
          keep-n-tagged: 5
          exclude-tags: latest,main

          # Remove old untagged package versions left behind by retagging.
          delete-untagged: true
          older-than: 90 days
          validate: true

          # Use GITHUB_TOKEN (no PAT required)
          token: ${{ secrets.GITHUB_TOKEN }}

          dry-run: false
